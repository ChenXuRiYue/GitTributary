name: Performance Gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance:
    name: Contracts, fixtures, and IPC
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./plugins/site-publisher/backend -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Restore main performance baseline
        id: performance-baseline
        uses: actions/cache/restore@v4
        with:
          path: performance/baselines/ci
          key: performance-baseline-${{ runner.os }}-${{ runner.arch }}-${{ github.event.pull_request.base.sha || github.sha }}
          restore-keys: |
            performance-baseline-${{ runner.os }}-${{ runner.arch }}-

      - name: Enable compatible baseline candidate
        shell: bash
        run: |
          if [[ -f performance/baselines/ci/metrics.json ]]; then
            echo "NA_PERF_BASELINE=performance/baselines/ci/metrics.json" >> "$GITHUB_ENV"
          fi

      - name: Build plugin host
        run: cargo build --manifest-path src-tauri/Cargo.toml -p na-plugin-host --release

      - name: Build site publisher plugin
        run: cargo build --manifest-path plugins/site-publisher/backend/Cargo.toml --release

      - name: Run performance gate
        run: npm run test:report -- --only performance --output test-reports/performance
        env:
          NA_PERF_RUNNER_CLASS: github-hosted-${{ runner.os }}-${{ runner.arch }}-ubuntu-22.04

      - name: Prepare successful main baseline
        if: success() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p performance/baselines/ci
          cp test-reports/performance/raw/performance/metrics.json performance/baselines/ci/metrics.json

      - name: Save successful main baseline
        if: success() && github.ref == 'refs/heads/main' && steps.performance-baseline.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: performance/baselines/ci
          key: performance-baseline-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}

      - name: Publish performance summary
        if: always()
        shell: bash
        run: |
          if [[ -f test-reports/performance/report.md ]]; then
            cat test-reports/performance/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Performance report unavailable" >> "$GITHUB_STEP_SUMMARY"
            echo "The performance run ended before report generation completed." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-reports/performance/**
          if-no-files-found: warn
          retention-days: 30
