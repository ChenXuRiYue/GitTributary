name: Release Installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        default: "v0.1.0"
      source_ref:
        description: "Git ref to build from. Use the same tag to rebuild an existing release."
        required: true
        default: "main"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            platform: ubuntu-22.04
            args: ""
          - label: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - label: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - label: Windows
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || inputs.source_ref }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libappindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install openssl@3 pkg-config
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust for macOS
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
          releaseName: "Git Tributary ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}"
          releaseBody: "See the assets below to download and install Git Tributary."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
